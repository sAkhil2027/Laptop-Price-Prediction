<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laptop Price Predictor</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg, #1e3c72, #2a5298);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 450px;
            margin: 50px auto;
            background: #ffffff;
            padding: 25px 30px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 12px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #1e3c72;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #e8f5e9;
            border-radius: 5px;
            text-align: center;
            font-size: 18px;
            color: #2e7d32;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Laptop Price Predictor</h1>

    <form method="POST">

        <label>Brand</label>
        <select name="company">
            {% for c in companies %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>

        <label>Type</label>
        <select name="type">
            {% for t in types %}
            <option value="{{ t }}">{{ t }}</option>
            {% endfor %}
        </select>

        <label>RAM (GB)</label>
        <input type="number" name="ram" required>

        <label>Weight (kg)</label>
        <input type="number" step="0.1" name="weight" required>

        <label>Touchscreen</label>
        <select name="touchscreen">
            <option>No</option>
            <option>Yes</option>
        </select>

        <label>IPS Display</label>
        <select name="ips">
            <option>No</option>
            <option>Yes</option>
        </select>

        <label>Screen Size (inches)</label>
        <input type="number" step="0.1" name="screen_size" required>

        <label>Resolution</label>
        <select name="resolution">
            <option>1920x1080</option>
            <option>1366x768</option>
            <option>2560x1440</option>
            <option>3840x2160</option>
        </select>

        <label>CPU</label>
        <select name="cpu">
            {% for c in cpus %}
            <option value="{{ c }}">{{ c }}</option>
            {% endfor %}
        </select>

        <label>HDD (GB)</label>
        <input type="number" name="hdd">

        <label>SSD (GB)</label>
        <input type="number" name="ssd">

        <label>GPU</label>
        <select name="gpu">
            {% for g in gpus %}
            <option value="{{ g }}">{{ g }}</option>
            {% endfor %}
        </select>

        <label>Operating System</label>
        <select name="os">
            {% for o in oss %}
            <option value="{{ o }}">{{ o }}</option>
            {% endfor %}
        </select>

        <button type="submit">Predict Price</button>
    </form>

    {% if price %}
    <div class="result">
        Predicted Price: ₹ {{ price }}
    </div>
    {% endif %}
</div>

</body>
</html>
